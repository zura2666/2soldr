<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wallet Adapter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="https://solana.com/favicon.ico" type="image/x-icon" />
    <style>
      :root {
        --bg-primary: #f7f7f9;
        --bg-secondary: #ffffff;
        --bg-tertiary: rgba(0, 0, 0, 0.03);
        --text-primary: #000000;
        --text-secondary: #6b7280;
        --border-color: rgba(0, 0, 0, 0.1);
        --border-hover: rgba(0, 0, 0, 0.2);
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        --wallet-bg: #ffffff;
        --wallet-hover: rgba(0, 0, 0, 0.05);
        --installed-bg: #eeeef1;
        --installed-text: #72757e;
      }
      
      [data-theme="dark"] {
        --bg-primary: #0c0e15;
        --bg-secondary: #1c1d21;
        --bg-tertiary: rgba(255, 255, 255, 0.05);
        --text-primary: #ffffff;
        --text-secondary: #6b7280;
        --border-color: rgba(255, 255, 255, 0.08);
        --border-hover: rgba(255, 255, 255, 0.15);
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        --wallet-bg: rgba(255, 255, 255, 0.03);
        --wallet-hover: rgba(255, 255, 255, 0.08);
        --installed-bg: transparent;
        --installed-text: #ffffff;
      }
      
      * {
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 400px;
        height: 380px;
        background: transparent;
        color: var(--text-primary);
        overflow: hidden;
      }
      body {
        display: block;
      }
      .card {
        background: var(--bg-primary);
        border-radius: 13px;
        padding: 16px;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow);
        width: 400px;
        height: 380px;
        margin: 0;
        animation: slideInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        transform-origin: center;
        position: relative;
        box-sizing: border-box;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: background 0.3s ease, border-color 0.3s ease;
      }
      
      /* Mobile styles - only applies on mobile devices */
      @media (max-width: 768px) and (pointer: coarse) {
        html,
        body {
          width: 100vw !important;
          height: 100vh !important;
          max-width: 100vw !important;
          max-height: 100vh !important;
          background: rgba(0, 0, 0, 0.5);
          backdrop-filter: blur(4px);
          overflow: hidden;
        }
        [data-theme="light"] html,
        [data-theme="light"] body {
          background: rgba(0, 0, 0, 0.3);
        }
        .card {
          width: 100vw !important;
          height: 70vh !important;
          max-width: 100vw !important;
          max-height: 70vh !important;
          min-height: 70vh !important;
          border-radius: 24px 24px 0 0 !important;
          margin: 0 !important;
          padding: 20px !important;
          padding-bottom: calc(24px + env(safe-area-inset-bottom, 0)) !important;
          position: fixed !important;
          bottom: 0 !important;
          left: 0 !important;
          right: 0 !important;
          top: auto !important;
          animation: slideUpFromBottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
          box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.3);
          box-sizing: border-box !important;
        }
        @keyframes slideUpFromBottom {
          from {
            transform: translateY(100%);
          }
          to {
            transform: translateY(0);
          }
        }
      }

      /* Header with title and close button */
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 13px;
        gap: 6px;
      }
      
      .header-actions {
        display: flex;
        align-items: center;
        gap: 3px;
      }
      
      .theme-toggle-button,
      .close-button {
        width: 25px;
        height: 25px;
        border-radius: 6px;
        border: none;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        transition: all 0.2s ease;
        padding: 0;
      }
      .theme-toggle-button:hover,
      .close-button:hover {
        background: var(--bg-tertiary);
        color: var(--text-primary);
      }
      
      .theme-toggle-button svg {
        width: 14px;
        height: 14px;
      }

      /* Search bar */
      .search-container {
        margin-bottom: 9px;
      }
      .search-input {
        width: 100%;
        padding: 9px 13px;
        padding-left: 32px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--bg-secondary);
        color: var(--text-primary);
        font-size: 11px;
        outline: none;
        transition: all 0.2s ease;
      }
      .search-input::placeholder {
        color: var(--text-secondary);
      }
      .search-input:focus {
        border-color: var(--border-hover);
        background: var(--bg-secondary);
        color: var(--text-primary);
      }
      .search-wrapper {
        position: relative;
      }
      .search-icon {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-secondary);
        font-size: 11px;
        pointer-events: none;
      }
      
      .back-button {
        position: absolute;
        top: 13px;
        left: 13px;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: var(--bg-tertiary);
        color: var(--text-primary);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        transition: all 0.2s ease;
        z-index: 10;
        opacity: 0;
        pointer-events: none;
      }
      .back-button.visible {
        opacity: 1;
        pointer-events: all;
        animation: fadeIn 0.3s ease-out;
      }
      .back-button:hover {
        background: var(--wallet-hover);
        border-color: var(--border-hover);
        transform: translateX(-2px);
      }
      
      /* Footer */
      .modal-footer {
        margin-top: auto;
        padding-top: 13px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 5px;
        color: var(--text-secondary);
        font-size: 9px;
      }
      .modal-footer svg {
        width: 11px;
        height: 11px;
      }
      .dynamic-logo {
        display: flex;
        align-items: center;
        gap: 3px;
      }
      
      
      .wallet-loading-container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100px;
        height: 100px;
      }
      
      .wallet-loading-icon {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.05);
        position: relative;
        z-index: 2;
      }
      .wallet-loading-icon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 12px;
      }
      
      .loading-ring {
        position: absolute;
        width: 100px;
        height: 100px;
        border-radius: 24px;
        z-index: 1;
        top: 0;
        left: 0;
        pointer-events: none;
      }
      .loading-ring svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100px;
        height: 100px;
      }
      .loading-ring path {
        fill: none;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-dasharray: 60 340;
        stroke-dashoffset: 0;
        animation: snakeAround 2s linear infinite;
      }
      .loading-ring.phantom path {
        stroke: #3b82f6;
      }
      .loading-ring.solflare path {
        stroke: #fbbf24;
      }
      .loading-ring.backpack path {
        stroke: #00d4ff;
      }
      .loading-ring.okx path {
        stroke: #00d4ff;
      }
      .loading-ring.coinbase path {
        stroke: #0052ff;
      }
      .loading-ring.rejected path {
        stroke: #ef4444;
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: snakeAroundComplete 1s ease-out forwards, shake 0.5s ease-out 1s;
      }
      @keyframes snakeAround {
        0% {
          stroke-dashoffset: 0;
        }
        100% {
          stroke-dashoffset: 400;
        }
      }
      @keyframes snakeAroundComplete {
        0% {
          stroke-dashoffset: 400;
        }
        100% {
          stroke-dashoffset: 0;
        }
      }
      
      .wallet-loading-name {
        font-size: 18px;
        font-weight: 500;
        text-align: center;
      }
      
      .wallet-loading-status {
        font-size: 14px;
        color: var(--text-secondary);
        text-align: center;
      }
      .rejection-message {
        margin-top: 16px;
        padding: 12px 16px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 12px;
        color: #ef4444;
        font-size: 13px;
        text-align: center;
        animation: fadeIn 0.3s ease-out, shake 0.5s ease-out;
        display: none;
      }
      .rejection-message.show {
        display: block;
      }
      
      .wallet-buttons.hidden {
        display: none;
      }
      
      .title.hidden,
      .subtitle.hidden {
        display: none;
      }
      
      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      
      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }
      
      @keyframes shimmer {
        0% {
          background-position: -1000px 0;
        }
        100% {
          background-position: 1000px 0;
        }
      }
      
      @keyframes bounce {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }
      .title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 0;
        text-align: left;
        letter-spacing: -0.3px;
        color: var(--text-primary);
        transition: color 0.3s ease;
      }
      .subtitle {
        display: none;
      }
      .wallet-buttons {
        display: flex;
        flex-direction: column;
        gap: 3px;
        flex: 1;
        overflow-y: auto;
        animation: fadeIn 0.6s ease-out 0.3s both;
      }
      .wallet-buttons::-webkit-scrollbar {
        width: 3px;
      }
      .wallet-buttons::-webkit-scrollbar-track {
        background: transparent;
      }
      .wallet-buttons::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 3px;
      }
      [data-theme="dark"] .wallet-buttons::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
      }
      .wallet-button {
        width: 100%;
        padding: 11px 13px;
        border-radius: 10px;
        border: 1px solid transparent;
        background: var(--wallet-bg);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
      }
      .wallet-button:hover:not(:disabled) {
        background: var(--wallet-hover);
        border-color: var(--border-color);
      }
      .wallet-button:active:not(:disabled) {
        transform: scale(0.99);
        transition: transform 0.1s;
      }
      .wallet-button:nth-child(1) {
        animation: slideIn 0.4s ease-out 0.1s both;
      }
      .wallet-button:nth-child(2) {
        animation: slideIn 0.4s ease-out 0.15s both;
      }
      .wallet-button:nth-child(3) {
        animation: slideIn 0.4s ease-out 0.2s both;
      }
      .wallet-button:nth-child(4) {
        animation: slideIn 0.4s ease-out 0.25s both;
      }
      .wallet-button:nth-child(5) {
        animation: slideIn 0.4s ease-out 0.3s both;
      }
      .wallet-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .wallet-button-content {
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .wallet-icon {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        flex-shrink: 0;
        background: transparent;
        transition: transform 0.2s ease;
        position: relative;
      }
      .wallet-button:hover:not(:disabled) .wallet-icon {
        transform: scale(1.05);
      }
      .wallet-icon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 3px;
        transition: transform 0.2s ease;
      }
      .wallet-name {
        font-weight: 400;
        font-size: 12px;
        color: var(--text-primary);
      }
      .wallet-status {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 10px;
        color: var(--installed-text);
        font-weight: 400;
        padding: 3px 8px;
        border-radius: 10px;
        background: var(--installed-bg);
      }
      .wallet-status .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #3b82f6;
        flex-shrink: 0;
      }
      .wallet-arrow {
        display: none;
      }
      .info {
        font-size: 9px;
        color: var(--text-secondary);
        margin-top: 13px;
        line-height: 1.6;
        text-align: center;
        padding: 9px;
        background: var(--wallet-bg);
        border-radius: 10px;
        border: 1px solid var(--border-color);
      }
      .status {
        margin-top: 13px;
        font-size: 10px;
        color: #a5b4fc;
        white-space: pre-line;
        text-align: center;
        padding: 9px;
        background: rgba(165, 180, 252, 0.1);
        border-radius: 10px;
        border: 1px solid rgba(165, 180, 252, 0.2);
        animation: fadeIn 0.4s ease-out;
      }
      .status.error {
        color: #f97373;
        background: rgba(249, 115, 115, 0.1);
        border-color: rgba(249, 115, 115, 0.2);
        animation: shake 0.5s ease-out;
      }
      .status.success {
        color: #4ade80;
        background: rgba(74, 222, 128, 0.1);
        border-color: rgba(74, 222, 128, 0.2);
        animation: bounce 0.6s ease-out;
      }
      .hidden {
        display: none;
      }
      .loading {
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      @keyframes shake {
        0%, 100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }
      
      .info {
        animation: fadeIn 0.4s ease-out;
      }
      
      /* Hide status elements in new design */
      .info, .status {
        display: none !important;
      }
      
      /* Hidden class */
      .hidden {
        display: none !important;
      }
      
      /* Single wallet view adjustments */
      .single-wallet-view {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        gap: 24px;
      }
      .single-wallet-view.active {
        display: flex;
        animation: fadeIn 0.3s ease-out;
      }
      
      /* Loading spinner */
      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
      }
      
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      
      @keyframes spinRounded {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      
      .wallet-loading-container.shake {
        animation: shake 0.5s ease-out;
      }
      
      .wallet-loading-container.rejected {
        filter: brightness(0.8);
      }
      
      .wallet-loading-container.rejected .wallet-loading-icon {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
    </style>
    <!-- Lightweight web3.js bundle for Transaction.from in the browser -->
    <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.js"></script>
  </head>
  <body>
        <link rel="icon" href="https://solana.com/favicon.ico" type="image/x-icon" />

    <div class="card">
      <button id="backBtn" class="back-button" title="Go back">←</button>
      
      <!-- Header -->
      <div class="modal-header" id="modalHeader">
        <div class="title" id="title">Log in or connect</div>
        <div class="header-actions">
          <button class="theme-toggle-button" id="themeToggle" title="Toggle light mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
          </button>
          <button class="close-button" id="closeBtn" title="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
      
      <div class="subtitle" id="subtitle"></div>
      
      <!-- Search bar -->
      <div class="search-container" id="searchContainer">
        <div class="search-wrapper">
          <span class="search-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>
          <input type="text" class="search-input" placeholder="Search through 14 wallets..." id="walletSearch" />
        </div>
      </div>
      
      <div class="wallet-buttons" id="walletButtons">
        <button id="phantomBtn" class="wallet-button" data-wallet="phantom">
          <div class="wallet-button-content">
            <div class="wallet-icon">
              <img src="https://iconic.dynamic-static-assets.com/icons/sprite.svg#phantom" alt="Phantom" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'color:#ab9ff2;font-weight:600;font-size:20px\'>P</span>';" />
            </div>
            <span class="wallet-name">Phantom</span>
          </div>
          <span class="wallet-arrow"></span>
        </button>
        <button id="backpackBtn" class="wallet-button" data-wallet="backpack">
          <div class="wallet-button-content">
            <div class="wallet-icon">
              <img src="https://iconic.dynamic-static-assets.com/icons/sprite.svg#backpack" alt="Backpack" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'color:#e33e3f;font-weight:600;font-size:20px\'>B</span>';" />
            </div>
            <span class="wallet-name">Backpack</span>
          </div>
          <span class="wallet-arrow"></span>
        </button>
        <button id="solflareBtn" class="wallet-button" data-wallet="solflare">
          <div class="wallet-button-content">
            <div class="wallet-icon">
              <img src="https://play-lh.googleusercontent.com/lql-v5JBq7UFMLQALnvZCX6r1X_Av8rVfrkzuv_fdjzEv88ucl4f5iCFfiN9isEc1TE=w240-h480-rw" alt="Solflare" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'color:#ff6b35;font-weight:600;font-size:20px\'>S</span>';" />
            </div>
            <span class="wallet-name">Solflare</span>
          </div>
          <span class="wallet-arrow"></span>
        </button>
        <button id="okxBtn" class="wallet-button" data-wallet="okx">
          <div class="wallet-button-content">
            <div class="wallet-icon">
              <img src="https://iconic.dynamic-static-assets.com/icons/sprite.svg#okx" alt="OKX" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'color:#00d4ff;font-weight:600;font-size:20px\'>O</span>';" />
            </div>
            <span class="wallet-name">OKX</span>
          </div>
          <span class="wallet-arrow"></span>
        </button>
        <button id="coinbaseBtn" class="wallet-button" data-wallet="coinbase">
          <div class="wallet-button-content">
            <div class="wallet-icon">
              <img src="https://images.ctfassets.net/o10es7wu5gm1/TWlW6aoAXPX7yUg5ShsZ0/c02522911b90b766eb8eef709e42b8eb/WalletLogo.png?fm=avif&w=640&h=640&q=65" alt="Coinbase" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'color:#0052ff;font-weight:600;font-size:20px\'>C</span>';" />
            </div>
            <span class="wallet-name">Coinbase</span>
          </div>
          <span class="wallet-arrow"></span>
        </button>
      </div>
      
      <!-- Footer -->
      <div class="modal-footer" id="modalFooter">
        <span>Powered by</span>
        <div class="dynamic-logo">
